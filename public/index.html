<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Milledgeville Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-950 to-emerald-950 text-white min-h-screen font-sans">
  <div class="flex min-h-screen relative">

    <!-- DESKTOP SIDEBAR -->
    <div id="sidebar" class="hidden md:flex w-64 bg-white/10 backdrop-blur-xl border-r border-white/10 flex-col">
      <div class="p-6 flex items-center gap-3">
        <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🏠</div>
        <h1 class="text-xl font-bold tracking-tight">Milledgeville Connect</h1>
      </div>
      <nav id="desktop-nav" class="flex-1 px-3"></nav>
      <div class="mx-4 mb-6" id="sidebar-user-area">
        <!-- Populated by renderNav() -->
      </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
      <!-- Top Bar -->
      <div class="bg-white/10 backdrop-blur-xl border-b border-white/10 px-4 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2 md:hidden min-w-0 flex-shrink-0">
          <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">🏠</div>
          <h1 class="text-lg font-bold truncate">Milledgeville Connect</h1>
        </div>
        <div class="flex-1 min-w-0 mx-3 md:mx-0">
          <input id="globalSearchInput" type="text" placeholder="What are you looking for in Milledgeville?"
                 class="w-full bg-white/10 border border-white/20 rounded-3xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-400 placeholder:text-white/50">
          <div id="globalSearchResults" class="hidden absolute top-full mt-2 w-full bg-slate-900 border border-white/20 rounded-3xl shadow-2xl max-h-96 overflow-auto z-50"></div>
        </div>
        <div id="topbar-user-area" class="md:hidden flex-shrink-0"></div>
      </div>

      <!-- CONTENT WRAPPER -->
      <div id="mobileContentWrapper" class="flex-1 min-w-0 w-full overflow-x-hidden overflow-y-auto pb-20 md:pb-0">
        <div id="content" class="p-3 md:p-6 w-full min-w-0" style="max-width:100%;box-sizing:border-box;overflow-x:hidden;"></div>
      </div>

      <!-- MOBILE BOTTOM NAV -->
      <div id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white/10 backdrop-blur-xl border-t border-white/10 flex justify-around py-2 z-40"></div>
    </div>
  </div>

  <!-- PROFILE SLIDE-UP SHEET (existing) -->
  <div onclick="if(event.target.id==='profileSheet')hideProfileSheet()" id="profileSheet"
       class="hidden fixed inset-0 bg-black/60 z-[11000] flex items-end">
    <div id="profileSheetPanel"
         onclick="event.stopImmediatePropagation()"
         class="bg-white text-slate-900 w-full rounded-t-3xl max-h-[90vh] overflow-auto transition-transform duration-300 translate-y-full">
      <div class="sticky top-0 bg-white pt-4 pb-2 flex justify-center z-10">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
      </div>
      <div class="px-6 pb-10">
        <div id="sheet-content" class="text-center"></div>
      </div>
    </div>
  </div>

  <!-- OTHER USER PROFILE MODAL (NEW) -->
  <div id="userProfileModal" onclick="if(event.target.id==='userProfileModal')hideUserProfileModal()" 
       class="hidden fixed inset-0 bg-black/70 z-[12000] flex items-center justify-center p-4">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-white text-slate-900 w-full max-w-md rounded-3xl overflow-hidden">
      <div id="userProfileContent" class="p-6"></div>
    </div>
  </div>

  <!-- MESSAGES / INBOX MODAL / PAGE (dynamic) -->
  <!-- (UI is rendered via JS in data.js) -->

  <!-- AUTH MODAL (existing) -->
  <div id="authModal" onclick="if(event.target.id==='authModal')hideAuthModal()"
       class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[10000]">
    <div onclick="event.stopImmediatePropagation()"
         class="bg-white text-slate-900 rounded-3xl max-w-md w-full mx-4 shadow-2xl">
      <div class="p-8">
        <h2 id="modalTitle" class="text-3xl font-bold mb-6 text-center">Welcome back</h2>
        <div id="loginForm">
          <input id="loginEmail" type="email" placeholder="Email"
                 class="w-full mb-3 px-5 py-4 rounded-3xl border border-slate-200 focus:border-emerald-500 outline-none">
          <input id="loginPassword" type="password" placeholder="Password"
                 class="w-full mb-6 px-5 py-4 rounded-3xl border border-slate-200 focus:border-emerald-500 outline-none">
          <button onclick="handleLogin()"
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-3xl font-semibold text-lg transition">Log In</button>
          <p onclick="switchToRegister()" class="text-center text-sm mt-6 text-emerald-600 cursor-pointer">Don't have an account? Register</p>
        </div>
        <div id="registerForm" class="hidden">
          <input id="regName" type="text" placeholder="Full Name"
                 class="w-full mb-3 px-5 py-4 rounded-3xl border border-slate-200 focus:border-emerald-500 outline-none">
          <input id="regEmail" type="email" placeholder="Email"
                 class="w-full mb-3 px-5 py-4 rounded-3xl border border-slate-200 focus:border-emerald-500 outline-none">
          <input id="regPassword" type="password" placeholder="Password"
                 class="w-full mb-6 px-5 py-4 rounded-3xl border border-slate-200 focus:border-emerald-500 outline-none">
          <button onclick="handleRegister()"
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-3xl font-semibold text-lg transition">Create Account</button>
          <p onclick="switchToLogin()" class="text-center text-sm mt-6 text-emerald-600 cursor-pointer">Already have an account? Log in</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts — ORDER MATTERS -->
  <script src="/js/api.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/main.js"></script>
  <script>
    // PWA Install Prompt (existing)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.createElement('button');
      installBtn.textContent = '📲 Install App';
      installBtn.className = 'fixed bottom-4 right-4 bg-emerald-600 text-white px-6 py-3 rounded-3xl shadow-2xl text-sm font-semibold z-[99999]';
      installBtn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { installBtn.remove(); });
      };
      document.body.appendChild(installBtn);
    });
  </script>
</body>
</html>
