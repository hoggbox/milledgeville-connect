<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account - Milledgeville Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-zinc-900 rounded-3xl p-8 text-center">
    <h1 class="text-3xl font-bold mb-6">Delete My Account</h1>
    <p class="text-zinc-400 mb-8">
      This will permanently delete your account and all associated data.
    </p>
    <button onclick="window.location.href='https://www.milledgevilleconnect.com/app.html#profile'" 
            class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-semibold">
      Go to App & Delete Account
    </button>
    <p class="text-xs text-zinc-500 mt-6">
      You must be logged in to the app to complete deletion.
    </p>
  </div>
</body>
</html>
